services:
  app:
    container_name: birthday-bot
  
    build: ./

    restart: always

    environment:
      - TelegramOptions__BotToken=${TELEGRAM_BOT_TOKEN}
      - BirthdayOptions__AdminIDs__0=${ADMIN_ID_1}
      - BirthdayOptions__AdminIDs__1=${ADMIN_ID_2}
      - BirthdayOptions__DateCulture=${BIRTHDAY_DATE_CULTURE}
      - BirthdayOptions__SendHour=${BIRTHDAY_SEND_HOUR}
      - BirthdayOptions__TimeZone=${BIRTHDAY_TIMEZONE}
      - BirthdayOptions__LateWindowMonths=${BIRTHDAY_LATE_WINDOW_MONTHS}
      - BirthdayOptions__CheckIntervalMinutes=${BIRTHDAY_CHECK_INTERVAL_MINUTES}

    volumes:
      - ./data:/app/data